{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Welcome, {{ username }}.</h2>
    <h3>History</h3>
    <table>
        <tbody>
            {% for entry in entries %}
            <tr>
                <td data-ts="{{ entry.createdat }}"></td>
                <td>{{ entry.filename }}</td>
                <td>{{ entry.filetype }}</td>
                <td>{{ entry.status }}</td>
                <td>
                    <form method="post" action="{{ url_for('DeleteRecord', recordid=entry.recordid) }}">
                        <button type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% if ErrorMessage %}<div>{{ ErrorMessage }}</div>{% endif %}
    <form method="post" action="{{ url_for('DeleteAccount') }}"><input type="password" name="password"><button type="submit">Delete Account</button></form>
    <form method="post" action="{{ url_for('VirusTotal') }}"><input type="password" name="virustotalkey" value="{{ virustotalkey }}"><button type="submit">Save Key</button></form>
</div>
{% endblock %}
